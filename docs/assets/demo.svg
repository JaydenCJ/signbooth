<svg xmlns="http://www.w3.org/2000/svg" width="740" height="460" viewBox="0 0 740 460" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace" font-size="13">
  <rect x="0" y="0" width="740" height="460" rx="10" fill="#1c1f26"/>
  <rect x="0" y="0" width="740" height="30" rx="10" fill="#2a2e38"/>
  <rect x="0" y="20" width="740" height="10" fill="#2a2e38"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5" fill="#28c840"/>
  <text x="370" y="19" fill="#8b93a7" text-anchor="middle" font-size="12">signbooth — keys stay in the booth</text>

  <text x="20" y="56" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> signbooth sign dist/app.tar.gz --key release --name dist/app.tar.gz</text>
  <text x="20" y="76" fill="#c8ceda">signed    dist/app.tar.gz</text>
  <text x="20" y="94" fill="#c8ceda">digest    <tspan fill="#61afef">sha256:adcab8d5…3627f466</tspan></text>
  <text x="20" y="112" fill="#c8ceda">key       release (<tspan fill="#61afef">SHA256:PCgLl4hbXT41USaV4/Vnm0B3OA5yIJQmoC9+7C8800Y</tspan>)</text>
  <text x="20" y="130" fill="#c8ceda">caller    ci</text>
  <text x="20" y="148" fill="#c8ceda">envelope  dist/app.tar.gz.sbsig</text>

  <text x="20" y="178" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> signbooth verify dist/app.tar.gz --pub release.pem   <tspan fill="#5c6370"># offline, anywhere</tspan></text>
  <text x="20" y="198" fill="#c8ceda"><tspan fill="#28c840">verified</tspan>  dist/app.tar.gz</text>
  <text x="20" y="216" fill="#c8ceda">digest    <tspan fill="#61afef">sha256:adcab8d5…3627f466</tspan></text>
  <text x="20" y="234" fill="#c8ceda">size      1861 bytes</text>
  <text x="20" y="252" fill="#c8ceda">key       release (<tspan fill="#61afef">SHA256:PCgLl4hbXT41USaV4/Vnm0B3OA5yIJQmoC9+7C8800Y</tspan>)</text>
  <text x="20" y="270" fill="#c8ceda">caller    ci</text>
  <text x="20" y="288" fill="#c8ceda">signed    2026-07-13T05:03:41Z</text>

  <text x="20" y="318" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> signbooth sign secret.pem --key release --name secrets/key.pem   <tspan fill="#5c6370"># same token</tspan></text>
  <text x="20" y="338" fill="#e06c75">signbooth: daemon replied 403: denied by policy:</text>
  <text x="20" y="356" fill="#e06c75">artifact "secrets/key.pem" matches no allowed pattern</text>

  <text x="20" y="386" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> signbooth audit verify</text>
  <text x="20" y="406" fill="#c8ceda">audit log ok: 5 entries, <tspan fill="#28c840">chain intact</tspan></text>

  <text x="20" y="436" fill="#5c6370"># private keys never left the booth; the token could only sign dist/**</text>
</svg>
